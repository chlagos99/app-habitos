<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hábitos">
    <link rel="manifest" href="manifest.json">
    <title>Tracker V5 - Pro Heatmap</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #34C759; --text: #fff; --gray: #888; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; padding-bottom: 80px; }
        h2 { margin-top: 10px; }
        .hidden { display: none !important; }
        
        .habit-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; }
        .habit-name { font-size: 18px; font-weight: 500; }
        .checkbox { width: 32px; height: 32px; border: 2px solid var(--gray); border-radius: 8px; background: transparent; cursor: pointer; transition: 0.2s; }
        .checkbox.checked { background: var(--primary); border-color: var(--primary); position: relative; }
        .checkbox.checked::after { content: '✓'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
        
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input[type="text"] { flex: 1; padding: 14px; border-radius: 10px; border: none; background: var(--surface); color: white; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #333; width: 100%; margin-top: 20px; }
        
        .filters { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        select { flex: 1; padding: 12px; border-radius: 8px; background: var(--surface); color: white; border: 1px solid #333; font-size: 16px; min-width: 100px; }
        
        /* Calendario Mensual */
        .grid-month { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .day-square { width: calc(100% / 7 - 8px); aspect-ratio: 1; border-radius: 6px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; }
        .day-square.active { background: var(--primary); color: #fff; font-weight: bold; }
        
        /* Mapa de Calor Pro */
        .heatmap-wrapper { display: flex; flex-direction: column; overflow-x: auto; padding-bottom: 10px; margin-top: 10px; }
        .heatmap-months { position: relative; height: 20px; margin-left: 20px; font-size: 12px; color: var(--gray); text-transform: capitalize; }
        .heatmap-month-label { position: absolute; }
        .heatmap-body { display: flex; gap: 8px; }
        .heatmap-y-axis { display: flex; flex-direction: column; gap: 5px; font-size: 10px; color: var(--gray); text-align: right; }
        .heatmap-y-axis div { height: 16px; line-height: 16px; width: 12px; }
        .heatmap-grid { display: flex; gap: 4px; }
        .heatmap-col { display: flex; flex-direction: column; gap: 4px; position: relative; }
        
        /* Línea separadora de mes */
        .heatmap-col.month-separator::before {
            content: ''; position: absolute; left: -2.5px; top: 0; bottom: 0; width: 1px; background: #555;
        }
        
        .heatmap-square { width: 16px; height: 16px; border-radius: 4px; background: #333; }
        .heatmap-square.active { background: var(--primary); }
        .heatmap-square.future { background: transparent; border: 1px solid #222; box-sizing: border-box; }
        
        #loader { text-align: center; color: var(--gray); margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loader">Cargando datos...</div>

    <div id="mainView" class="hidden">
        <h2 id="dateHeader">Hoy</h2>
        <div id="habitList"></div>

        <div class="input-group">
            <input type="text" id="newHabit" placeholder="Nuevo hábito...">
            <button id="addBtn" onclick="addHabit()">Añadir</button>
        </div>

        <button class="btn-secondary" onclick="toggleView('dashboardView')">Ver Resumen</button>
    </div>

    <div id="dashboardView" class="hidden">
        <button class="btn-secondary" style="margin-top:0; margin-bottom: 20px;" onclick="toggleView('mainView')">← Volver</button>
        <h2>Resumen</h2>
        
        <div class="filters">
            <select id="habitSelect" onchange="renderDashboard()"></select>
            <select id="viewType" onchange="toggleDashboardLayout()">
                <option value="heatmap">Últimas 19 Semanas</option>
                <option value="month">Mensual (Calendario)</option>
            </select>
        </div>

        <div class="filters hidden" id="monthFilters">
            <select id="monthSelect" onchange="renderDashboard()"></select>
            <select id="yearSelect" onchange="renderDashboard()"></select>
        </div>

        <div id="calendarGrid"></div>
    </div>

    <script>
        const BIN_ID = '69d92e0caaba882197e5796e'; 
        const API_KEY = '$2a$10$/2JqA.OgJy8fhLE7D/8JZOAMn8Ui/VcwYvnbkaTybMTbJXBBzFMam';
        
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        let data = { habits: [], completions: {} };
        let isSyncing = false;

        const getLocalToday = () => {
            const d = new Date();
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().slice(0, 10);
        };
        const today = getLocalToday();

        async function initApp() {
            try {
                const response = await fetch(API_URL, { headers: { 'X-Master-Key': API_KEY } });
                if (response.ok) {
                    const json = await response.json();
                    data = json.record;
                }
            } catch (error) { console.error("Error GET:", error); } 
            finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('mainView').classList.remove('hidden');
                renderMain();
            }
        }

        async function saveData() {
            if (isSyncing) return;
            isSyncing = true;
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(data)
                });
            } catch (error) { console.error("Error PUT:", error); } 
            finally { isSyncing = false; }
        }

        function toggleView(viewId) {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'dashboardView') initDashboard();
        }

        function renderMain() {
            document.getElementById('dateHeader').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            const list = document.getElementById('habitList');
            list.innerHTML = '';

            data.habits.forEach(habit => {
                const isDone = data.completions[habit.id]?.includes(today);
                const div = document.createElement('div');
                div.className = 'habit-row';
                div.innerHTML = `
                    <span class="habit-name">${habit.name}</span>
                    <div class="checkbox ${isDone ? 'checked' : ''}" onclick="toggleHabit('${habit.id}')"></div>
                `;
                list.appendChild(div);
            });
        }

        async function addHabit() {
            const input = document.getElementById('newHabit');
            const btn = document.getElementById('addBtn');
            const name = input.value.trim();
            if (!name) return;

            btn.disabled = true;
            const id = 'h_' + Date.now();
            data.habits.push({ id, name });
            data.completions[id] = [];
            
            input.value = '';
            renderMain();
            await saveData();
            btn.disabled = false;
        }

        async function toggleHabit(id) {
            if (!data.completions[id]) data.completions[id] = [];
            const index = data.completions[id].indexOf(today);
            
            if (index > -1) data.completions[id].splice(index, 1);
            else data.completions[id].push(today);
            
            renderMain();
            await saveData();
        }

        function initDashboard() {
            const habitSelect = document.getElementById('habitSelect');
            habitSelect.innerHTML = data.habits.map(h => `<option value="${h.id}">${h.name}</option>`).join('');
            
            const monthSelect = document.getElementById('monthSelect');
            const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
            monthSelect.innerHTML = months.map((m, i) => `<option value="${i+1}" ${new Date().getMonth() === i ? 'selected' : ''}>${m}</option>`).join('');

            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            yearSelect.innerHTML = `<option value="${currentYear}">${currentYear}</option><option value="${currentYear-1}">${currentYear-1}</option>`;

            toggleDashboardLayout();
        }

        function toggleDashboardLayout() {
            const viewType = document.getElementById('viewType').value;
            const monthFilters = document.getElementById('monthFilters');
            if (viewType === 'month') monthFilters.classList.remove('hidden');
            else monthFilters.classList.add('hidden');
            renderDashboard();
        }

        function renderDashboard() {
            const habitId = document.getElementById('habitSelect').value;
            const viewType = document.getElementById('viewType').value;
            const container = document.getElementById('calendarGrid');
            container.innerHTML = '';

            if (!habitId) return;
            const completions = data.completions[habitId] || [];

            if (viewType === 'month') {
                container.className = 'grid-month';
                const month = parseInt(document.getElementById('monthSelect').value);
                const year = parseInt(document.getElementById('yearSelect').value);
                const daysInMonth = new Date(year, month, 0).getDate();

                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    const isDone = completions.includes(dateStr);
                    const square = document.createElement('div');
                    square.className = `day-square ${isDone ? 'active' : ''}`;
                    square.innerText = i;
                    container.appendChild(square);
                }
            } else {
                container.className = '';
                container.innerHTML = `
                    <div class="heatmap-wrapper">
                        <div class="heatmap-months" id="heatmapMonths"></div>
                        <div class="heatmap-body">
                            <div class="heatmap-y-axis">
                                <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
                            </div>
                            <div class="heatmap-grid" id="heatmapColumns"></div>
                        </div>
                    </div>
                `;

                const monthsContainer = document.getElementById('heatmapMonths');
                const colsContainer = document.getElementById('heatmapColumns');

                // Lógica de alineación por semanas
                const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                const localNow = new Date(Date.now() - tzOffset);
                
                // Buscar el lunes de hace 14 semanas
                const daysToMonday = (localNow.getDay() + 6) % 7;
                const startMonday = new Date(localNow);
                startMonday.setDate(localNow.getDate() - daysToMonday - (18 * 7));

                const todayStr = localNow.toISOString().slice(0, 10);

                for (let w = 0; w < 19; w++) {
                    const col = document.createElement('div');
                    let isNewMonth = false;
                    let monthName = '';

                    for (let d = 0; d < 7; d++) {
                        const cellDate = new Date(startMonday);
                        cellDate.setDate(startMonday.getDate() + (w * 7) + d);
                        const dateStr = cellDate.toISOString().slice(0, 10);
                        
                        // Detectar primer día del mes para la línea y la etiqueta
                        if (cellDate.getDate() === 1 || (w === 0 && d === 0)) {
                            isNewMonth = true;
                            monthName = cellDate.toLocaleString('es-ES', { month: 'short' });
                        }

                        const isFuture = dateStr > todayStr;
                        const isDone = completions.includes(dateStr);
                        
                        const square = document.createElement('div');
                        square.className = `heatmap-square ${isDone ? 'active' : ''} ${isFuture ? 'future' : ''}`;
                        square.title = dateStr;
                        col.appendChild(square);
                    }

                    col.className = 'heatmap-col' + (isNewMonth && w !== 0 ? ' month-separator' : '');
                    colsContainer.appendChild(col);

                    if (isNewMonth) {
                        const label = document.createElement('div');
                        label.className = 'heatmap-month-label';
                        label.innerText = monthName;
                        // Cada columna mide 16px + 4px de gap = 20px
                        label.style.left = (w * 20) + 'px';
                        monthsContainer.appendChild(label);
                    }
                }
            }
        }

        initApp();
    </script>
</body>
</html>
